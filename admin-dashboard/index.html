<!DOCTYPE html>
<html>
  <head>
    <title>Admin Dashboard</title>
    <style>
      *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial;
      }
      body{
        display:flex;
        background:#f4f4f4;
        ]
        .sidebar{
          width:220px;
          height:100vh;
          background:#111827;
          color:white;
          padding;20px;
          position:fixed;
        }
        .sidebar h2{
          margin-bottom:30px;
          color:#60a5fa;
        }
        .sidebar a{
          display:block;
          color:white;
          text-decoration:none;
          margin:15px 0;
          padding:10px;
          border-radius:8px;
        }
        .sidebar a:hover{
          background:#1f2937;
        }
        .main{
          margin-left:240px;
          padding:30px;
          width:100%;
        }
        .top{
          display:flex;
          justify-content:space-between;
          align-items:center;
          margin-bottom:30px;
        }
        .top h1{
          color:#111827;
        }
        .cards{
          display:grid;
          grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
          gap:20px;
        }
        .card{
          background:white;
          padding:25px;
          border-radius:15px;
          box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }
        .card h3{
          color:#6b7280;
          margin-bottom:10px;
        }
        .card p{
          font-size:28px;
          font-weight:bold;
          color:#111827;
        }
        .table{
          margin-top:40px;
          background:white;
          padding:20px;
          border-radius:15px;
          box-shadow:0 5px 15px rgba(0,0,0,0.1);
        }
        table{
          width:100%;
          border-collapse:collapse;
        }
        table th,
        table td{
          padding:15px;
          text-align:left;
          border-bottom:1px solid #ddd;
        }
        table th{
          background:#f9fafb;
        }
    </style>
  </head>
  <body>
    <div class="sidebar">
      <h2>Dashboard</h2>
      <a href="#">Home</a>
      <a href="#">Analytics</a>
      <a href="#">Users</a>
      <a href="#">Orders</a>
      <a href="#">Settings</a>
    </div>
    <div class="main">
      <div class="top">
        <h1>Admin Dashboard</h1>
        <h3>Welcome Zainab</h3>
      </div>
      <div class="cards">
        <div class="cards">
          <h3>Total Users</h3>
          <p>1,250</p>
        </div>
         <div class="cards">
          <h3>Total Sales</h3>
          <p>$8,420</p>
        </div>
         <div class="cards">
          <h3>Orders</h3>
          <p>320</p>
        </div>
         <div class="cards">
          <h3>Revenue</h3>
          <p>$12,500</p>
        </div>
      </div>
      <div class="table">
        <h2>Recent Orders</h2>
        <table>
          <tr>
            <th>Name</th>
            <th>Product</th>
            <th>Status</th>
          </tr>
          <tr>
            <th>Ayesha</th>
            <th>Laptop</th>
            <th>Delivered</th>
          </tr>
          <tr>
            <th>Ali</th>
            <th>Phone</th>
            <th>Pending</th>
          </tr>
          <tr>
            <th>Sara</th>
            <th>Headphones</th>
            <th>Shipped</th>
          </tr>
        </table
          </div>
    </div>
  </body>
</html>
