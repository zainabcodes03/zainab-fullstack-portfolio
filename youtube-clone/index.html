<!DOCTYPE html>
<html>
  <head>
    <title>Youtube Clone</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel"stylesheet">
    <style>
      *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Poppins'.sans-serif;
      }
      body{
        background;#0f172a;
        color:white;
      }
      nav{
        background:#111827;
        padding:15px 30px;
        display:flex;
        justify-content:space-between;
        align-items:center;
        position:sticky;
        top:0;
      }
      nav h1{
        color:#ff004f;
        font-size:28px;
      }
      nav input{
        width:300px;
        padding:10px;
        border:none;
        border-radius:25px;
        outline:none;
      }
      .videos{
        display:grid;
        grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
        gap:25px;
        padding:40px;
      }
      .card{
        background:#1e293b;
        border-radius:15px;
        overflow:hidden;
        transition:0.3s;
        box-shadow:0 5px 15px rgba(0,0,0,0.4);
      }
      .card:hover{
        transform:translateY(-10px) scale(1.02);
      }
      .card img{
        width:100%;
        height:180px;
        object-fit:cover;
      }
      .content{
        padding:15px;
      }
      .content h3{
        margin-bottom:10px;
        color:#fff;
      }
      .content p{
        color:#94a3b8;
        font-size:14px;
      }
      .btn{
        margin-top:15px;
        background:linear-gradient(135deg,#ff004f,#ff7b00);
        border:none;
        color:white;
        padding:10px 18px;
        border-radius:25px;
        cursor:pointer;
        font-weight:bold;
      }
      .btn:hover{
        opacity:0.8;
      }
    </style>
  </head>
  <body>
    <nav>
      <h1>ZainabTube</h1>
      <input type="text" placeholder="Search videos...">
    </nav>
    <div class="videos">
      <div class="card">
        <img src="https://images.unsplash.com/photo-1515879218367-8466d910aaa4?auto=format&fit=crop&w=1200&q=80">
        <div class="content">
          <h3>Frontend Developer Roadmap</h3>
          <p>Learn HTML, CSS & JavaScript step-by-step</p>
          <button class="btn">Watch Now</button>
        </div>
      </div>
     <div class="card">
      <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3?q=80&w=1200">
      <div class="content">
      <h3>UI Design Tutorial</h3>
      <p>Create modern and professional websites ✨</p>
      <button class="btn">Watch Now</button>
    </div>
  </div>
  <div class="card">
    <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?q=80&w=1200">
  <div class="content">
      <h3>How To Build Projects</h3>
      <p>Best portfolio projects for developers 🔥</p>
      <button class="btn">Watch Now</button>
    </div>
 </div>
</div>
  </body>
</html>
