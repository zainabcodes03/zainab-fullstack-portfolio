<!DOCTYPE html>
<html>
  <head>
    <title>Netflix Clone</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"rel="stylesheet">
    <style>
      *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:'Poppins',sans-serif;
      }
      body{
        background:#000;
        color:white;
        ]
        .hero{
          height:100vh;
          background:linear-gradient(rgba(0,0,0,0.7),rgba(0,0,0,0.8)),
          url('https://images.unplash.com/photo-1489599849927-2ee91cede3ba?auto=forms&fit=crop&w=1500&q=80');
          background-size:cover;
          background-position:center;
        }
        nav{
          display:flex;
          justify-content:space-between;
          align-items:center;
          padding:25px 60px;
        }
        .logo{
          color:#e50914;
          font-size:40px;
          font-weight:bold;
        }
        .btn{
          background:#e50914;
          color:white;
          border:none;
          padding:10px 20px;
          border-radius:5px;
          cursor:pointer;
        }
        .content{
          text-align:center;
          margin-top:180px;
          padding:20px;
        }
        .content h1{
          font-size:60px;
          margin-bottom:20px;
        }
        .content p{
          font-size:22px;
          margin-bottom:25px;
        }
        .content input{
          padding:15px;
          width:300px;
          border:none;
          border-radius:5px;
        }
        .movies{
          padding:50px;
        }
        .movies h2{
          margin-bottom:20px;
        }
        .row{
          display:flex;
          gap:20px;
          flex-wrap:wrap;
        }
        .card{
          width:250px;
          background:#111;
          border-radius:10px;
          overflow:hidden;
          transition:0.3s;
        }
        .card:hover{
          transform:scale(1.08);
        }
        .card img{
          width:100%;
          height:150px;
          object-fit:cover;
        }
        .card h3{
          padding:15px;
        }    
    </style>
  </head>
  <body>
    <div class="hero">
      <nav>
    <div class="logo">NETFLIX</div>
<button class="btn">Sign In</button>
</nav>

<div class="content">

<h1>Unlimited Movies, TV Shows & More</h1>

<p>Watch anywhere. Cancel anytime.</p>

<input type="email" placeholder="Enter your email">

<button class="btn">Get Started</button>

</div>
    </div>     

<div class="movies">

<h2>Trending Now 🔥</h2>

<div class="row">

<div class="card">
<img src="https://picsum.photos/300/200?1">
<h3>Stranger Things</h3>
</div>

<div class="card">
<img src="https://picsum.photos/300/200?2">
<h3>Money Heist</h3>
</div>

<div class="card">
<img src="https://picsum.photos/300/200?3">
<h3>Wednesday</h3>
</div>

<div class="card">
<img src="https://picsum.photos/300/200?4">
<h3>Dark</h3>
</div>
</div>
</div>
</body>
</html>
