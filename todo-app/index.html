<!DOCTYPE html>
<html>
  <head>
    <title>To-Do App</title>
    <style>
      body{
        font-family:Arial;
        background:#f5f5dc;
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
      }
      .box{
        background:white;
        padding:20px;
        border-radius:10px;
        width:300px;
        text-align:center;
      }
      input{
        padding:10px;
        width:70%;
      }
      button{
        padding:10px;
        margin-top:10px;
        background:#4a00e0;
        color:white;
        border:none;
      }
      li{
        text-align:left;
        margin:5px 0;
        cursor:pointer;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h2>To-Do App</h2>
      <input id="task" placeholder="Enter task">
      <br>
      <button onclick="addTask()">Add</button>
      <ul id="list"></ul>
    </div>
    <script>
     function addTask(){
       let task = document.getElementById("task").value;
       if(task === ""){
         alert("Enter something!");
         return;
       }
       let li = document.createElement("li");
       li.innerText = task;
       li.onclick = function(){
         li.style.textDecoration = "line-through;
       }
       document.getElementById("list").appendChild(li);
       document.getElementById("task).value="";
    </script>
  </body>
</html>
