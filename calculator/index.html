<!DOCTYPLE html>
<html>
  <head>
    <title>Calculator</title>
    <style>
      body{
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        background:#222;
        font-family:Arial;
      }
      .calc{
        background:#333;
        padding:20px;
        border-radius:10px;
        text-align:center;
      }
      input{
        width:100%;
        padding:10px;
        margin-bottom:10px;
        font-size:18px;
        text-align:right;
      }
      button{
        width:50px;
        height:50px;
        margin:5px;
        font-size:18px;
        border:none;
        border-radius:8px;
        cursor:pointer;
      }
      .btn{
        background:#555;
        color:white;
      }
      .equal{
        background:red;
        color:white;
      }
      .clear{
        background:#4a00e0;
        color:white;
      }
    </style>
  </head>
  <body>
    <div class="calc">
      <input id="result" readonly>
      <br>
      <button class="btn" onclick="calc('7')">7</button>
      <button class="btn" onclick="calc('8')">8</button>
      <button class="btn" onclick="calc('9')">9</button>
      <button class="btn" onclick="calc('/')">/</button>
      <br>
      <button class="btn" onclick="calc('4')">4</button>
      <button class="btn" onclick="calc('5')">5</button>
      <button class="btn" onclick="calc('6')">6</button>
      <button class="btn" onclick="calc('*')">*</button>
      <br>
      <button class="btn" onclick="calc('1')">1</button>
      <button class="btn" onclick="calc('2')">2</button>
      <button class="btn" onclick="calc('3')">3</button>
      <button class="btn" onclick="calc('-')">-</button>
      <br>
      <button class="btn" onclick="calc('0')">0</button>
      <button class="btn" onclick="calc('.')">.</button>
      <button class="equal" onclick="equal()">=</button>
      <button class="btn" onclick="calc('+')">+</button>
      <br>
      <button class="clear" onclick="clearResult()">C</button>
    </div>
    <script>
      function calc(val){
        document.getElementById("result").value +=val;
      }
      function equal(){
        let x = document.getElementById("result").value;
        document.getElementById("result").value = eval(x);
      }
      function clearResult(){
        document.getElementById("result").value ="";
      }
    </script>
  </body>
</html>
